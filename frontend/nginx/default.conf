server {
    listen 80;
    server_name _;

    # Web root where the SPA build output is copied
    root /usr/share/nginx/html;
    index index.html;

    # Protect nginx from very large requests (tweak as needed)
    client_max_body_size 10M;

    # Serve static assets (adjust paths if your build uses another prefix)
    # These will be cached aggressively; ensure your build pipeline fingerprints files.
    location ~* \.(?:css|js|svg|ttf|woff2?|eot|otf|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Optional: enable gzip_static if you generate pre-compressed assets
        # gzip_static on;
    }

    # If you place other static assets under /static or /assets, handle them here
    location /static/ {
        try_files $uri $uri/ =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy API calls to the backend service
    # Keep the /api/ prefix so the backend can assume a consistent base path.
    # Special-case websocket endpoints under /api/ws so nginx will perform the HTTP->WS Upgrade.
    location /api/ws {
        # Forward the websocket upgrade to the backend. Keep the /api/ws prefix so the backend sees the same path.
        proxy_pass http://backend:8080/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep long read timeout for long-lived websocket connections
        proxy_read_timeout 3600s;
        proxy_connect_timeout 15s;
        proxy_buffering off;
    }

    # General API proxy (non-websocket)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Ensure connection header doesn't break keepalives for regular HTTP API calls
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_connect_timeout 15s;
    }

    # Example WebSocket proxying (uncomment if needed)
    # location /ws/ {
    #     proxy_pass http://backend:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 3600s;
    # }

    # SPA fallback: serve index.html for any non-file, non-API request so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers (tweak according to your security policy)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header X-XSS-Protection "1; mode=block";
    # Consider adding a strict Content-Security-Policy in production

    # Serve wasm with long cache TTL and keep access logs minimal.
    # This is important because main.wasm is fingerprinted and large; serve it compressed when available.
    location ~* \.wasm$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Enable gzip and serve precompressed files if present.
    # `gzip_static on` makes nginx prefer pre-gzipped files (e.g. main.wasm.gz) when the client accepts gzip.
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text_xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # Optional: small healthcheck endpoint for orchestration
    location = /healthz {
        access_log off;
        return 200 'ok';
    }
}
